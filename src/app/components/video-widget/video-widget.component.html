<div class="video-widget-section">
  <div class="video-widget-card">
    <div class="video-widget-header" [ngClass]="videoPlayerClass">
      <span class="video-widget-title">{{ videoPlayerTitle }}</span>
    </div>
    <div class="video-widget-player">
      <iframe
        [title]="videoPlayerTitle"
        class="video-player"
        [src]="urlSafe"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</div>
