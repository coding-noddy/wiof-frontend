<ion-card class="wiof-calendar-wrapper" *ngIf="EnvDays">
  <ion-card-header class="wiof-env-calender-header wiof-home">
    <ion-card-title class="title-text">
      <span>Environment Calender</span></ion-card-title
    >
  </ion-card-header>
  <ion-card-content class="wiof-env-calender-content background">
    <ion-grid class="wiof-calendar-container">
      <ion-row>
        <ion-col class="month-header">
          <div class="month-switcher">
            <button class="month-nav" (click)="changeMonth(-1)" aria-label="Previous month">
              <ion-icon name="caret-back-outline"></ion-icon>
            </button>
            <div class="month-title">
              <h1>{{ displayMonth }}</h1>
              <p>{{ displayDay }}</p>
            </div>
            <button class="month-nav" (click)="changeMonth(1)" aria-label="Next month">
              <ion-icon name="caret-forward-outline"></ion-icon>
            </button>
          </div>
          <div *ngIf="isLoading" class="calendar-loading">
            Loading calendar...
          </div>
        </ion-col>
      </ion-row>
      <ion-row class="weekday">
        <ion-col>Sun</ion-col>
        <ion-col>Mon</ion-col>
        <ion-col>Tue</ion-col>
        <ion-col>Wed</ion-col>
        <ion-col>Thu</ion-col>
        <ion-col>Fri</ion-col>
        <ion-col>Sat</ion-col>
      </ion-row>
      <div class="days-grid">
        <div
          *ngFor="let day of days"
          [class]="day.class"
          [ngClass]="{
            'occasion-day-container': day.occasion?.length,
            'empty-day': !day.day,
            'clickable': day.occasion?.length
          }"
          (click)="day.occasion?.length ? openOccasionDialog(day) : null"
          [attr.title]="
            day.occasion?.length ? day.occasion[day.selectedOccasionIndex]?.name : null
          "
        >
          <div
            [ngClass]="{
              'occasion-day': day.occasion?.length,
              'no-occasion-day': !day.occasion?.length
            }"
          >
            <div
              class="day-number"
              [ngClass]="{
                'occasion-day-date': day.occasion?.length,
                'no-occasion-day-date': !day.occasion?.length
              }"
            >
              {{ day.day }}
            </div>
            <!-- Occasion image as cell background via inline style -->
            <div
              *ngIf="day.occasion?.length && day.occasion[day.selectedOccasionIndex]"
              class="occasion-bg-image"
              [style.backgroundImage]="'url(' + (day.occasion[day.selectedOccasionIndex].image | async) + ')'"
            ></div>
            <div *ngIf="day.occasion && day.occasion.length > 1" class="occasion-nav-buttons">
              <button
                class="nav-button"
                [disabled]="day.selectedOccasionIndex === 0"
                (click)="prevOccasion(day); $event.stopPropagation()"
              >
                <ion-icon name="caret-back-outline"></ion-icon>
              </button>

              <button
                class="nav-button"
                [disabled]="day.selectedOccasionIndex === day.occasion.length - 1"
                (click)="nextOccasion(day); $event.stopPropagation()"
              >
                <ion-icon name="caret-forward-outline"></ion-icon>
              </button>
            </div>
          </div>
        </div>
      </div>
    </ion-grid>
    <div class="wiof-env-calendar-dialog-container" *ngIf="openDialog">
      <app-env-cal-dialog
        [occasionDetails]="occasionForDialog"
        (close)="closeDialog()"
      ></app-env-cal-dialog>
    </div>
  </ion-card-content>
</ion-card>
