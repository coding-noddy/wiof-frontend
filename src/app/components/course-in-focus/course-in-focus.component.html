<ion-card
  *ngIf="coursesInFocus?.length > 0"
  class="wiof-course-in-focus-container"
>
  <ion-card-header class="ion-align-center wiof-slider-header">
    <ion-card-title class="title-text">Course in Focus</ion-card-title>
  </ion-card-header>

  <ion-card-content class="background ion-no-padding">
    <div *ngIf="coursesInFocus; else loading">
      <ion-slides #slider [options]="slideOpts">
        <ion-slide *ngFor="let courseInFocus of coursesInFocus">
          <div class="course-card">

            <!-- ── Top row: title + thumbnail ─────────────────────── -->
            <div class="course-top">
              <div class="course-title-block">
                <a [href]="courseInFocus.link" target="_blank" class="course-name-link">
                  {{ courseInFocus.name }}
                </a>
              </div>
              <div class="course-thumb-wrap">
                <img
                  class="course-thumb"
                  [src]="courseInFocus.image$ | async"
                  [alt]="courseInFocus.name"
                />
              </div>
            </div>

            <!-- ── Metadata pills ─────────────────────────────────── -->
            <div class="course-meta">
              <div class="meta-item">
                <span class="meta-label">Offered By</span>
                <span class="meta-value">{{ courseInFocus.offeredBy }}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Platform</span>
                <span class="meta-value">{{ courseInFocus.platform }}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Duration</span>
                <span class="meta-value">{{ courseInFocus.duration }}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Cost</span>
                <span class="meta-value">{{ courseInFocus.approxCost }}</span>
              </div>
            </div>

            <!-- ── Key topics ─────────────────────────────────────── -->
            <div class="course-topics">
              <span class="meta-label">Key Topics</span>
              <div class="topics-list">
                <span
                  class="home-key-tag"
                  *ngFor="let topic of courseInFocus.keyTopics.split(',')"
                >{{ topic.trim() }}</span>
              </div>
            </div>

            <!-- ── Description ────────────────────────────────────── -->
            <p class="course-description">{{ courseInFocus.description }}</p>

            <!-- ── CTA ───────────────────────────────────────────── -->
            <div class="course-cta">
              <a [href]="courseInFocus.link" target="_blank" class="wiof-primary-link">
                Know More
              </a>
            </div>

          </div>
        </ion-slide>
      </ion-slides>

      <div
        *ngIf="coursesInFocus.length > 1"
        class="swiper-button-prev navigation-arrow-custom-styling"
        (click)="slider.slidePrev()"
      ></div>
      <div
        *ngIf="coursesInFocus.length > 1"
        class="swiper-button-next navigation-arrow-custom-styling"
        (click)="slider.slideNext()"
      ></div>
    </div>

    <ng-template #loading>
      <app-wiof-spinner></app-wiof-spinner>
    </ng-template>
  </ion-card-content>
</ion-card>
