<div class="consent-bar">

    <ion-icon name="shield-checkmark-outline" class="consent-icon"></ion-icon>
    <p class="consent-text">
      We value your privacy. By continuing to use this site, you agree to our
      <a [routerLink]="['/privacy-policy']">Privacy Policy</a>.

    Got it
  </button>
</div>
