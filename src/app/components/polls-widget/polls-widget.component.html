<ion-card class="wiof-poll-card" *ngIf="pollQuestion">
  <ion-card-header class="wiof-polls-widget-card-header">
    <ion-card-title class="wiof-polls-widget-card-header-text">
      Weekly Polls
      <div class="poll-subtitle">Have your say — one vote per person</div>
    </ion-card-title>
  </ion-card-header>

  <ion-card-content class="wiof-polls-widget-card-background">
    <div *ngIf="showForm" class="polls-container">
      <form [formGroup]="wiofPollsForm" (submit)="submit()" class="poll-form">
        <div class="poll-question">
          <div class="question-label">Poll Question</div>
          <div class="question-text">{{ pollQuestion.question }}</div>
        </div>

        <div class="poll-options-list">
          <label
            class="poll-option"
            *ngFor="let option of pollQuestion.options; let i = index"
            [attr.for]="'option' + i"
            >
            <input
              type="radio"
              id="option{{i}}"
              name="option"
              value="option{{ i + 1 }}"
              formControlName="option"
            />
              <div class="option-body">
                <div class="option-text">{{ option }}</div>
                <div class="option-meta" *ngIf="showPollResult">
                  <div class="option-percent">
                    {{ optionData['option' + (i + 1)]?.percent | number: '1.0-0' }}%
                  </div>
                  <div class="option-progress">
                    <div
                      class="option-progress-fill"
                      [style.width]="optionData['option' + (i + 1)]?.percent + '%'"
                    ></div>
                  </div>
                </div>
              </div>
          </label>
        </div>

        <div class="poll-footer">
          <input
            formControlName="name"
            id="name"
            name="name"
            placeholder="Your name (optional)"
            class="poll-widget-name-input"
          />

          <div class="cta-and-error">
            <p *ngIf="errorShow" class="error">Please select an option</p>
            <button class="wiof-primary-btn" type="submit">
              Submit Vote
            </button>
          </div>
        </div>
      </form>
    </div>

    <app-poll-result
      *ngIf="showPollResult"
      [pollQuestion]="pollQuestion"
    ></app-poll-result>
  </ion-card-content>
</ion-card>
