<div class="wiof-env-calendar-dialog">
  <div *ngIf="occasionDetails; else loading">
    <ion-slides #wiofOccasionSlider [options]="slideOpts">
      <ion-slide *ngFor="let occasn of occasionDetails.occasion">
        <ion-card class="occasion-card">

          <!-- ── Header ─────────────────────────────────────────────── -->
          <ion-card-header class="occasion-card-header">
            <div class="header-row">
              <span class="occasion-date-badge">
                {{ getMonth(occasn.month) }} {{ occasn.day }}
              </span>
              <p class="occasion-name">{{ occasn.name }}</p>
              <button class="occasion-close-btn" (click)="closeDialog()" aria-label="Close">
                <ion-icon name="close"></ion-icon>
              </button>
            </div>
          </ion-card-header>

          <!-- ── Image — fixed height so modal doesn't jump ────────── -->
          <div class="occasion-image-wrap">
            <img
              class="occasion-image"
              [src]="occasn.image | async"
              [alt]="occasn.name"
            />
          </div>

          <!-- ── Body ──────────────────────────────────────────────── -->
          <ion-card-content class="occasion-body">
            <p [innerHTML]="occasn.desc"></p>
            <div class="occasion-cta" *ngIf="occasn.link">
              <a class="wiof-primary-link" target="_blank" [href]="occasn.link">
                Know More
              </a>
            </div>
          </ion-card-content>

        </ion-card>
      </ion-slide>
    </ion-slides>

    <div
      class="swiper-button-prev navigation-arrow-custom-styling"
      (click)="wiofOccasionSlider.slidePrev()"
      *ngIf="showNavigation"
    ></div>
    <div
      class="swiper-button-next navigation-arrow-custom-styling"
      (click)="wiofOccasionSlider.slideNext()"
      *ngIf="showNavigation"
    ></div>
  </div>

  <ng-template #loading>
    <div class="dialog-loading">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  </ng-template>
</div>
