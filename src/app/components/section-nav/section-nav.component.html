<nav class="section-nav" *ngIf="sections?.length > 0" [ngClass]="'theme-' + element">
  <div class="nav-scroll">
    <button
      *ngFor="let item of sections"
      class="nav-item"
      [class.active]="activeSection === item.sectionId"
      [class.disabled]="item.disabled"
      [disabled]="item.disabled"
      (click)="!item.disabled && scrollTo(item.sectionId)"
    >
      {{ item.label }}
    </button>
  </div>
</nav>
