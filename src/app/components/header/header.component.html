<ion-header>
  <ion-row>
    <ion-col class="ion-align-self-start ion-no-padding">
      <ion-toolbar class="toolbar-background-wrapper" style="padding-left: 5px;">
        <ion-buttons class="menu-button-toggle" slot="start">
        </ion-buttons>
        <ion-title routerLink="/home" style="padding: 0;">
          <ion-img style="height: 56px; float: left;" alt="World is one family logo" [src]="wiofLogo"></ion-img>
        </ion-title>
      </ion-toolbar>
    </ion-col>

    <ion-col class="ion-align-self-end ion-no-padding">
      <ion-toolbar class="toolbar-background-wrapper">
        <ion-buttons slot="end">
          <ion-button routerLink="/aboutus"> About Us </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-col>
  </ion-row>
</ion-header>
