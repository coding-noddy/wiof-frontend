<!-- (3) Title → full width (top) , Video → centered (middle), Content → bottom (full width) -->
<ion-card *ngIf="inFocuses?.length > 0" class="wiof-in-focus-container">
  <ion-card-header class="wiof-video-player-header" [ngClass]="inFocusClass">
    <ion-card-title class="title-text"> {{ inFocusTitle }} </ion-card-title>
  </ion-card-header>

  <ion-card-content class="ion-no-padding background wiof-in-focus-content" [ngClass]="inFocusClass">
    <ion-slides #slider [options]="slideOpts">
      <ion-slide *ngFor="let inFocus of inFocuses">

        <div class="vertical-layout">

          <!-- TITLE -->
          <div class="title-section">
            <strong class="in-focus-subtitle">{{ inFocus.subTitle }}</strong>
          </div>

          <!-- VIDEO -->
          <div class="video-section">
            <iframe
              [title]="inFocus.title"
              class="videoPlayer"
              [src]="inFocus.sanitizedLink"
              allowfullscreen
            ></iframe>
          </div>

          <!-- DESCRIPTION -->
          <div class="desc-section">
            <p>{{ inFocus.description }}</p>
          </div>

        </div>

      </ion-slide>
    </ion-slides>

    <div
      *ngIf="inFocuses.length > 1"
      class="swiper-button-prev navigation-arrow-custom-styling"
      (click)="slider.slidePrev()"
    ></div>
    <div
      *ngIf="inFocuses.length > 1"
      class="swiper-button-next navigation-arrow-custom-styling"
      (click)="slider.slideNext()"
    ></div>
  </ion-card-content>
</ion-card>
