<div class="in-focus-section" *ngIf="inFocuses?.length > 0">
  <div class="in-focus-strip" [ngClass]="inFocusClass">

    <!-- Header bar -->
    <div class="in-focus-header" [ngClass]="inFocusClass">
      <span class="in-focus-header-title">{{ inFocusTitle }}</span>
    </div>

    <!-- Slider -->
    <div class="in-focus-slider-wrap">
      <ion-slides #slider [options]="slideOpts">
        <ion-slide *ngFor="let inFocus of inFocuses">
          <div class="in-focus-slide">

            <!-- Full-width video -->
            <div class="in-focus-video">
              <iframe
                [title]="inFocus.title"
                class="in-focus-player"
                [src]="inFocus.sanitizedLink"
                allowfullscreen
              ></iframe>
            </div>

            <!-- Caption bar overlaid at the bottom -->
            <div class="in-focus-caption">
              <h3 class="caption-title">{{ inFocus.subTitle }}</h3>
              <p class="caption-desc" *ngIf="inFocus.description">{{ inFocus.description }}</p>
            </div>

          </div>
        </ion-slide>
      </ion-slides>

      <!-- Nav arrows -->
      <div
        *ngIf="inFocuses.length > 1"
        class="nav-btn nav-prev"
        (click)="slider.slidePrev()"
      >
        <ion-icon name="chevron-back"></ion-icon>
      </div>
      <div
        *ngIf="inFocuses.length > 1"
        class="nav-btn nav-next"
        (click)="slider.slideNext()"
      >
        <ion-icon name="chevron-forward"></ion-icon>
      </div>
    </div>

  </div>
</div>
