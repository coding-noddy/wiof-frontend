<app-header></app-header>
<app-subscribe [page]="'earth'"></app-subscribe>
<app-social-share style="z-index: 2"></app-social-share>

<app-section-nav [sections]="pageSections" [element]="elementName"></app-section-nav>
<ion-content>
  <div class="page-container">

    <!-- ── Banner ──────────────────────────────────────────────── -->
    <div class="element-hero earth">
      <!-- <div class="hero-text">
        <h1>Earth</h1>
        <p>Rediscover our planet — from food we eat to forests we protect.</p>
      </div> -->
    </div>

    <app-life-elements [element]="elementName"></app-life-elements>
<!-- ── Video + Widget ──────────────────────────────────────── -->
    <section class="section-block" id="earth-featured-video">
      <div class="video-widget-row">
        <div class="video-col">
          <app-video-widget [element]="elementName"></app-video-widget>
        </div>
        <div class="widget-col">
          <app-food-ph-indicator></app-food-ph-indicator>
        </div>
      </div>
    </section>

    <!-- ── In Focus ─────────────────────────────────────────── -->
    <section class="section-block" id="earth-in-focus">
      <app-in-focus-widget
        [inFocuses]="this.inFocuses$ | async"
        [element]="elementName"
      ></app-in-focus-widget>
    </section>

    <!-- ── Coffee Conversation ─────────────────────────────────── -->
    <section
      class="section-block"
      id="earth-conversations"
      *ngIf="this.coffeeConversations$ | async as coffeeConversations"
    >
      <app-coffee-conversation
        [element]="elementName"
        [coffeeConvList]="coffeeConversations"
      ></app-coffee-conversation>
    </section>

    <!-- ── Blogs ───────────────────────────────────────────────── -->
    <section class="section-block" id="earth-blogs">
      <div class="section-header">
        <h2>Blogs</h2>
      </div>
      <app-blog-slider
        [blogList]="blogs$ | async"
        [element]="elementName"
      ></app-blog-slider>
    </section>

    <!-- ── Videos ──────────────────────────────────────────────── -->
    <section class="section-block" id="earth-videos" *ngIf="videos$ | async as videos">
      <div class="section-header" *ngIf="videos.length > 0">
        <h2>Videos</h2>
      </div>
      <app-video-slider
        [videoList]="videos"
        [element]="elementName"
      ></app-video-slider>
    </section>

  </div>
  <app-wiof-footer></app-wiof-footer>
</ion-content>
